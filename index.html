<!DOCTYPE html>
<!-- assigment 3 to do list, start off with some basic html layout for the page-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- title for page -->
    <title>Daily Tasks</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!--this is the Main container -->
    <div class="container">

        <!-- Title -->
        <h1>My To-Do List</h1>

        <!-- Input section -->
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter a task...">
            <button id="addBtn">Add</button>
        </div>

        <!-- each Task list will be here -->
        <ul id="taskList"></ul>

    </div>
    <!--connect the js script-->
    <script src="js/script.js"></script>
</body>
</html>
